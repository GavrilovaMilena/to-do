<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ToDo Calendar</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗓️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>

<body>
    <!-- Левая панель заметок -->
    <div class="notes-panel" id="notesPanel">
        <!-- Контент панели -->
        <div class="notes-content" id="notesContent">
            <div id="monthYearLabel">Январь 2026</div>
            <div id="miniCalendar"></div>
            <h2 id="notesTitle" class="editable-title">Заметки</h2>
            <textarea class="notes-textarea" id="notes"></textarea>
        </div>

        <!-- Кнопка сворачивания (всегда видна) -->
        <button class="toggle-notes-btn" id="toggleNotesBtn" title="Свернуть/развернуть">📁</button>
    </div>

    <!-- Календарь -->
    <div class="calendar-container">
        <div class="week-nav">
            <!-- Центральная панель навигации -->
            <div class="week-nav-center">
                <button class="nav-btn" id="prevWeek" title="Предыдущая неделя">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 18 9 12 15 6"></polyline>
                    </svg>
                </button>
                <div class="week-label" id="weekLabel">Неделя</div>
                <button class="nav-btn" id="nextWeek" title="Следующая неделя">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 18 15 12 9 6"></polyline>
                    </svg>
                </button>
                <button class="nav-btn" id="todayBtn" title="Текущая неделя">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                        <line x1="16" y1="2" x2="16" y2="6"></line>
                        <line x1="8" y1="2" x2="8" y2="6"></line>
                        <line x1="3" y1="10" x2="21" y2="10"></line>
                    </svg>
                </button>
            </div>

            <!-- Правая часть: только тема -->
            <div class="week-nav-right">
                <button class="theme-toggle" id="themeToggle" title="Сменить тему">
                    <!-- Будет меняться динамически -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="theme-icon">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
            </div>
        </div>
        <!-- Заголовки Пн-Сб -->
        <div class="week-header" id="weekHeader"></div>
        <!-- Основная сетка: Пн-Сб -->
        <div class="week-grid" id="weekGrid"></div>
        <!-- Заголовок Вс + колонка Вс -->
        <div class="sunday-section" id="sundaySection"></div>
    </div>

    <script src="script.js"></script>
</body>

</html>
